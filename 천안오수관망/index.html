
<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate'>
<meta http-equiv='Pragma' content='no-cache'>
<meta http-equiv='Expires' content='0'>


<link href='https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css' rel='stylesheet' />
<script src='https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js'></script>

<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
#map { width:100%; height:100%; }

.btn {
    position:absolute;
    left:10px;
    z-index:999;
    padding:8px 12px;
    background:#fff;
    border-radius:4px;
    border:1px solid #999;
    cursor:pointer;
}
#btnMyLoc { top:10px; }
#btnMemo { top:50px; }
#btnCamera { top:90px; }
</style>
</head>

<body>

<div id='map'></div>

<button id='btnMyLoc' class='btn'>📍 위치</button>
<button id='btnMemo' class='btn'>📝 메모</button>
<button id='btnCamera' class='btn'>📷 카메라</button>

<input type='file' id='cameraInput' accept='image/*' capture='environment' style='display:none;'>

<script>

// =====================
// 지도 생성
// =====================
const map = new maplibregl.Map({
    container: 'map',
    style: {
        version: 8,
        sources: {
            sat: {
                type: 'raster',
                tiles: ['https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg'],
                tileSize: 256
            }
        },
        layers: [
            { id: 'sat', type: 'raster', source: 'sat' }
        ]
    },
    center: [127,37],
    zoom: 12
});

// =====================
// 메모 저장
// =====================
function saveData(d){
    localStorage.setItem('qx_memo', JSON.stringify(d));
}

function loadData(){
    let d = localStorage.getItem('qx_memo');
    if(!d) return {type:'FeatureCollection',features:[]};
    return JSON.parse(d);
}

// =====================
// 레이어
// =====================
map.on('load', ()=>{

    map.addSource('memo',{
        type:'geojson',
        data:loadData()
    });

    map.addLayer({
        id:'memo',
        type:'circle',
        source:'memo',
        paint:{
            'circle-radius':8,
            'circle-color':[
                'match',
                ['get','kind'],
                'photo','#00ffff',
                '#ffff00'
            ],
            'circle-stroke-color':'#000',
            'circle-stroke-width':2
        }
    });

});

// =====================
// GPS 위치
// =====================
function getGPS(cb){
    if(!navigator.geolocation){
        alert('GPS 불가');
        return;
    }
    navigator.geolocation.getCurrentPosition(p=>{
        cb(p.coords.longitude, p.coords.latitude);
    },()=>{
        alert('위치 실패');
    });
}

// =====================
// 메모 버튼
// =====================
document.getElementById('btnMemo').onclick=function(){

    getGPS((lng,lat)=>{

        let txt = prompt('메모 입력');
        if(!txt) return;

        let d = loadData();

        d.features.push({
            type:'Feature',
            geometry:{type:'Point',coordinates:[lng,lat]},
            properties:{kind:'memo',memo:txt}
        });

        saveData(d);
        map.getSource('memo').setData(d);

        map.flyTo({center:[lng,lat],zoom:17});
    });
};

// =====================
// 카메라 버튼
// =====================
document.getElementById('btnCamera').onclick=function(){

    getGPS((lng,lat)=>{

        let input = document.getElementById('cameraInput');

        input.onchange=function(e){

            let file=e.target.files[0];
            if(!file) return;

            let reader=new FileReader();

            reader.onload=function(){

                let d=loadData();

                d.features.push({
                    type:'Feature',
                    geometry:{type:'Point',coordinates:[lng,lat]},
                    properties:{
                        kind:'photo',
                        img:reader.result
                    }
                });

                saveData(d);
                map.getSource('memo').setData(d);

                map.flyTo({center:[lng,lat],zoom:17});
            };

            reader.readAsDataURL(file);
            input.value='';
        };

        input.click();
    });
};

// =====================
// 클릭 → 보기
// =====================
map.on('click',function(e){

    let f = map.queryRenderedFeatures(e.point,{layers:['memo']})[0];
    if(!f) return;

    let html='';

    if(f.properties.memo)
        html += f.properties.memo + '<br>';

    if(f.properties.img)
        html += '<img src="'+f.properties.img+'" width=200>';

    new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(html)
        .addTo(map);
});

</script>
</body>
</html>
