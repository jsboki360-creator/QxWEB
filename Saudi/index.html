let baseIndex = 0;

function showBaseMap(idx){

    for(let bm of baseMaps){

        map.setLayoutProperty(
            bm.id,
            'visibility',
            'none'
        );
    }

    map.setLayoutProperty(
        baseMaps[idx].id,
        'visibility',
        'visible'
    );

    document.getElementById('btnBase').innerText =
        baseMaps[idx].text;
}

document.getElementById('btnBase').onclick=function(){

    baseIndex++;

    if(baseIndex >= baseMaps.length)
        baseIndex = 0;

    showBaseMap(baseIndex);
};


map.dragRotate.disable();
map.touchZoomRotate.disableRotation();

function saveMemoData(data){
    localStorage.setItem('qx_memo', JSON.stringify(data));
}

function loadMemoData(){
    const d = localStorage.getItem('qx_memo');
    if (!d) return { type:'FeatureCollection', features:[] };
    try {
        return JSON.parse(d);
    } catch(err) {
        return { type:'FeatureCollection', features:[] };
    }
}

function escapeHtml(s){
    if (s === null || s === undefined) return '';
    return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replace(/'/g,'&#039;');
}

map.on('load', () => {

    let bounds = null;

    // -------------------------
    // SOURCE
    // -------------------------
    if (!map.getSource('memo')) {
        map.addSource('memo', {
            type: 'geojson',
            data: loadMemoData()
        });
    }

    // -------------------------
    // 📝 메모 (원)
    // -------------------------
    if (!map.getLayer('memo_layer')) {
        map.addLayer({
            id:'memo_layer',
            type:'circle',
            source:'memo',

            filter:['==',['get','kind'],'memo'],

            paint:{
                'circle-radius':[
                    'interpolate',['linear'],['zoom'],
                    10,5,
                    15,8,
                    18,11
                ],
                'circle-color':'#ffff00',
                'circle-stroke-color':'#000000',
                'circle-stroke-width':2
            }
        });
    }

    // -------------------------
    // 📷 사진 (네모)
    // -------------------------
    if (!map.getLayer('photo_layer')) {
        map.addLayer({
    id:'photo_layer',
    type:'circle',   // 🔥 변경
    source:'memo',

    filter:['==',['get','kind'],'photo'],

    paint:{
        'circle-radius':[
            'interpolate',['linear'],['zoom'],
            10,5,
            15,8,
            18,11
        ],
        'circle-color':'#a020f0',   // 🔥 보라색
        'circle-stroke-color':'#000000',
        'circle-stroke-width':2
    }
});
    }



    const data_Al_Qassim_PIPE_src = data_Al_Qassim_PIPE;
    data_Al_Qassim_PIPE_src.features.forEach((f,i)=>{f.id=i;});

    if (map.getSource('Al_Qassim_PIPE')) map.removeSource('Al_Qassim_PIPE');

    map.addSource('Al_Qassim_PIPE', { type:'geojson', data:data_Al_Qassim_PIPE_src });

    map.addLayer({
        id:'Al_Qassim_PIPE_polygon',
        type:'fill',
        source:'Al_Qassim_PIPE',
        filter:['==',['geometry-type'],'Polygon'],
        paint:{ 'fill-color':'#ff0000','fill-opacity':0.2 }
    });

    map.addLayer({
        id:'Al_Qassim_PIPE_line',
        type:'line',
        source:'Al_Qassim_PIPE',
        filter:['==',['geometry-type'],'LineString'],
        paint:{
            'line-width':['interpolate',['linear'],['zoom'],10,1,15,2,20,3],
            'line-color':'#ff0000'
        }
    });

    map.addLayer({
        id:'Al_Qassim_PIPE_point',
        type:'circle',
        source:'Al_Qassim_PIPE',
        filter:[
            'in',
            ['geometry-type'],
            ['literal',['Point','MultiPoint']]
        ],
        paint:{
            'circle-radius':['interpolate',['linear'],['zoom'],10,2,15,4,18,6],
            'circle-color':'#00ff00'
        }
    });

    for (let feat of data_Al_Qassim_PIPE_src.features) {
        let coords=[];
        if (!feat.geometry) continue;

        if (feat.geometry.type==='Point') coords=[feat.geometry.coordinates];
        else if (feat.geometry.type==='MultiPoint') coords=feat.geometry.coordinates;
        else if (feat.geometry.type==='LineString') coords=feat.geometry.coordinates;
        else if (feat.geometry.type==='MultiLineString') coords=feat.geometry.coordinates.flat();
        else if (feat.geometry.type==='Polygon') coords=feat.geometry.coordinates[0];
        else if (feat.geometry.type==='MultiPolygon') coords=feat.geometry.coordinates.flat(2);

        for (let c of coords) {
            if (!c || c.length < 2) continue;
            if (!bounds) bounds=[[c[0],c[1]],[c[0],c[1]]];
            else {
                bounds[0][0]=Math.min(bounds[0][0],c[0]);
                bounds[0][1]=Math.min(bounds[0][1],c[1]);
                bounds[1][0]=Math.max(bounds[1][0],c[0]);
                bounds[1][1]=Math.max(bounds[1][1],c[1]);
            }
        }
    }

    if(bounds) map.fitBounds(bounds,{padding:40,maxZoom:19});
});



// GPS
let myLocOn=false;
let myLocTimer=null;
let firstMove=true;

function initMyLocLayer(){
    if(!map.getSource('myloc')){
        map.addSource('myloc',{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:[0,0]}}});
        map.addLayer({
            id:'myloc_layer',
            type:'circle',
            source:'myloc',
            paint:{
                'circle-radius':8,
                'circle-color':'#00ffff',
                'circle-stroke-color':'#000000',
                'circle-stroke-width':2
            }
        });
    }
}

Function Fix6(v As Double) As Double
    Return Math.Round(v, 6)
End Function

function updateMyLocation(){
    if (!navigator.geolocation) {
        alert('GPS를 사용할 수 없습니다.');
        return;
    }

    navigator.geolocation.getCurrentPosition(function(pos){
        const lng=pos.coords.longitude;
        const lat=pos.coords.latitude;

        if (!map.getSource('myloc')) initMyLocLayer();

        map.getSource('myloc').setData({
            type:'Feature',
            geometry:{type:'Point',coordinates:[lng,lat]},
            properties:{}
        });

        if(firstMove){
            map.flyTo({center:[lng,lat],zoom:17});
            firstMove=false;
        }
    }, function(err){
        alert('위치 정보를 가져올 수 없습니다.');
    }, {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:5000
    });
}

document.getElementById('btnMyLoc').onclick=function(){

    myLocOn=!myLocOn;

    if(myLocOn){
        this.innerText='📍 위치 ON';
        firstMove=true;
        initMyLocLayer();
        updateMyLocation();
        myLocTimer=setInterval(updateMyLocation,10000);
    }else{
        this.innerText='📍 위치 OFF';
        if(myLocTimer) clearInterval(myLocTimer);
    }
};

// 상세 / 메모 / 카메라
let detailMode=false;
let currentPopup=null;
let lastClickLngLat=null;



document.getElementById('btnDetail').onclick=function(){
    detailMode=!detailMode;
    clickAction=null; 
    this.innerText=detailMode?'🔍 상세 ON':'🔍 상세 OFF';
};

// 메모 (수정)
document.getElementById('btnMemo').onclick=function(){

    if (!navigator.geolocation) {
        alert('GPS 사용 불가');
        return;
    }

    navigator.geolocation.getCurrentPosition(function(pos){

        const lng = pos.coords.longitude;
        const lat = pos.coords.latitude;

        let txt = prompt('메모 입력');
        if (!txt) return;

        let data = loadMemoData();

        data.features.push({
            type:'Feature',
            geometry:{
                type:'Point',
                coordinates:[lng, lat]
            },
            properties:{
                kind:'memo',
                memo:txt,
                img:null,
                time:new Date().toLocaleString()
            }
        });

        saveMemoData(data);
        map.getSource('memo').setData(data);

        map.flyTo({center:[lng,lat],zoom:17});

    }, function(){
        alert('위치 가져오기 실패');
    }, {
        enableHighAccuracy:true
    });
};

// 카메라 (수정)
document.getElementById('btnCamera').onclick=function(){

    if (!navigator.geolocation) {
        alert('GPS 사용 불가');
        return;
    }

    navigator.geolocation.getCurrentPosition(function(pos){

        // 🔥 현재 위치 저장
        lastClickLngLat = {
            lng: pos.coords.longitude,
            lat: pos.coords.latitude
        };

        // 📷 카메라 실행
        document.getElementById('cameraInput').click();

    }, function(){
        alert('위치 가져오기 실패');
    });
};

map.on('click', function(e){

    try {

        const bbox = [
            [e.point.x - 30, e.point.y - 30],
            [e.point.x + 30, e.point.y + 30]
        ];

        let features = map.queryRenderedFeatures(bbox);
        if (!features || features.length === 0) return;

        let f = features.find(x =>
            x.layer.id === 'memo_layer' ||
            x.layer.id === 'photo_layer'
        );

        if (!f) f = features.find(x => x.layer.id.includes('_point'));
        if (!f) f = features[0];
        if (!f) return;

        if (currentPopup) currentPopup.remove();

        // 🔥 메모/사진 팝업
        if (f.layer.id === 'memo_layer' || f.layer.id === 'photo_layer') {

            let html = '<div class="memoPopup">';

if (f.properties.memo)
    html += '<b>메모:</b> ' + escapeHtml(f.properties.memo) + '<br>';

if (f.properties.time)
    html += '<b>시간:</b> ' + escapeHtml(f.properties.time) + '<br>';

if (f.properties.img)
    html += '<img src="' + f.properties.img + '">';

// 🔥 버튼 추가
html += '<br>';
html += '<button onclick="editMemo(' + f.id + ')">✏️ 수정</button> ';
html += '<button onclick="deleteMemo(' + f.id + ')">🗑 삭제</button>';

html += '</div>';

            currentPopup = new maplibregl.Popup({closeOnClick:false})
                .setLngLat(e.lngLat)
                .setHTML(html)
                .addTo(map);

            return;
        }

        // 상세
        if (!detailMode) return;

        let html = '<div style="font-size:12px;">';

        for(let k in f.properties){
            html += '<b>' + escapeHtml(k) + '</b>: ' + escapeHtml(f.properties[k]) + '<br>';
        }

        html += '</div>';

        currentPopup = new maplibregl.Popup({closeOnClick:false})
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);

    } catch(err) {
        console.log(err);
    }
});

// 카메라 / 사진 저장
document.getElementById('cameraInput').onchange = function(e){



    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(){

        let memo = prompt('사진 메모 입력', '사진');
        if (!memo) memo = '사진';

        let data = loadMemoData();

  data.features.push({
    type:'Feature',
    geometry:{
        type:'Point',
        coordinates:[
            lastClickLngLat.lng + 0.00001,
            lastClickLngLat.lat + 0.00001
        ]
    },
    properties:{
        kind:'photo',
        memo:memo,
        img:reader.result,
        time:new Date().toLocaleString()
    }
});
data.features.forEach((f,i)=>{f.id=i;});

        saveMemoData(data);
        map.getSource('memo').setData(data);

    };

    reader.readAsDataURL(file);
    this.value = '';
};

function editMemo(id){

    let data = loadMemoData();

    let f = data.features[id];
    if (!f) return;

    let newTxt = prompt('메모 수정', f.properties.memo);

    if (newTxt === null){
        if (currentPopup) currentPopup.remove();
        return;
    }
    if (newTxt === null) return;

    f.properties.memo = newTxt;

    saveMemoData(data);
    map.getSource('memo').setData(data);
if (currentPopup) currentPopup.remove();
}

function deleteMemo(id){

    if (!confirm('삭제하시겠습니까?')){
        if (currentPopup) currentPopup.remove();
        return;
    }

    let data = loadMemoData();

    data.features.splice(id,1);

    // 🔥 중요 (id 재정렬)
    data.features.forEach((f,i)=>{f.id=i;});

    saveMemoData(data);
    map.getSource('memo').setData(data);
if (currentPopup) currentPopup.remove();
}
